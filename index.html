<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HER KÜFÜR 50 TL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: radial-gradient(circle at center, #1a1a2e 0%, #050508 100%); font-family: 'Orbitron', sans-serif; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); }
        .glitch-text { text-shadow: 3px 0 #ff00ff, -3px 0 #00ffff; letter-spacing: 2px; text-align: center; margin: 30px 0; }
        .btn-plus { background: linear-gradient(135deg, #22c55e, #15803d); }
        .btn-minus { background: linear-gradient(135deg, #ef4444, #b91c1c); }
    </style>
</head>
<body>
    <h1 class="glitch-text text-3xl md:text-5xl font-black uppercase italic">HER KÜFÜR <span class="text-cyan-400">50 TL</span></h1>
    <div id="cards-container" class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-6xl">
        <div class="col-span-full text-center py-20 text-gray-500 animate-pulse text-2xl uppercase">Kasa Açılıyor...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBsO1gM5ySFNSn-rJnN0HyGEtuj3K5z22c",
            authDomain: "swearvault.firebaseapp.com",
            // DOĞRU URL BURASI (BELÇİKA SUNUCUSU):
            databaseURL: "https://swearvault-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "swearvault",
            storageBucket: "swearvault.firebasestorage.app",
            messagingSenderId: "176233756449",
            appId: "1:176233756449:web:e7387814c263520a6c3060"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const users = [{id:'arda', name:'ARDA', color:'#00f2ff'}, {id:'recep', name:'RECEP', color:'#bc4ed8'}, {id:'emir', name:'EMİR', color:'#f8ef42'}];

        db.ref('vault').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            const container = document.getElementById('cards-container');
            container.innerHTML = '';
            users.forEach(user => {
                const balance = data[user.id] || 0;
                container.innerHTML += `
                    <div class="glass-card p-6 flex flex-col items-center relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1" style="background:${user.color}"></div>
                        <h2 class="text-lg font-bold text-gray-400 mb-2 uppercase">${user.name}</h2>
                        <div class="text-5xl font-black mb-1">${balance}<span class="text-sm font-normal text-gray-500 ml-1">TL</span></div>
                        <div class="w-full bg-black/30 rounded-full h-2 my-6">
                            <div class="h-full rounded-full transition-all duration-500" style="width:${Math.min((balance/2000)*100, 100)}%; background-color:${user.color}; box-shadow:0 0 10px ${user.color}"></div>
                        </div>
                        <div class="flex gap-3 w-full">
                            <button onclick="updateBalance('${user.id}', 50)" class="btn-plus flex-1 py-4 rounded-xl font-bold text-xs active:scale-95 transition">KÜFÜR (+50)</button>
                            <button onclick="updateBalance('${user.id}', -50)" class="btn-minus flex-1 py-4 rounded-xl font-bold text-xs active:scale-95 transition opacity-70 italic">SİL</button>
                        </div>
                    </div>`;
            });
        });

        function updateBalance(userId, amount) {
            db.ref('vault/' + userId).transaction(c => (c || 0) + amount < 0 ? 0 : (c || 0) + amount);
        }
    </script>
</body>
</html>
