<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HER KÜFÜR 50TL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #050508 100%);
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            items: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .glitch-text {
            text-shadow: 3px 0 #ff00ff, -3px 0 #00ffff;
            letter-spacing: 5px;
            text-align: center;
            margin-top: 40px;
            margin-bottom: 50px;
        }

        .btn-plus { background: linear-gradient(135deg, #22c55e, #15803d); }
        .btn-minus { background: linear-gradient(135deg, #ef4444, #b91c1c); }
        
        .progress-glow {
            filter: drop-shadow(0 0 8px currentColor);
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>

    <h1 class="glitch-text text-4xl md:text-6xl font-black uppercase italic">
        THE <span class="text-cyan-400">SWEAR</span> VAULT
    </h1>

    <div id="cards-container" class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-6xl">
