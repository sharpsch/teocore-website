<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SWEAR VAULT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #050508 100%);
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .glitch-text {
            text-shadow: 3px 0 #ff00ff, -3px 0 #00ffff;
            letter-spacing: 5px;
        }

        .btn-plus { background: linear-gradient(135deg, #22c55e, #15803d); box-shadow: 0 0 15px rgba(34, 197, 94, 0.3); }
        .btn-minus { background: linear-gradient(135deg, #ef4444, #b91c1c); box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
        
        .progress-glow {
            filter: drop-shadow(0 0 8px currentColor);
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Mobile Adjustments */
        @media (max-width: 640px) {
            .glitch-text { font-size: 1.8rem; letter-spacing: 2px; }
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <h1 class="glitch-text text-4xl md:text-6xl font-black mb-16 text-center italic tracking-widest uppercase">
        THE <span class="text-cyan-400">SWEAR</span> VAULT
    </h1>

    <div id="cards-container" class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-6xl">
        <div class="col-span-full text-center py-20 text-gray-500 animate-pulse">Kasa Yükleniyor...</div>
    </div>

    <script>
        // Senin Firebase Bilgilerin
        const firebaseConfig = {
            apiKey: "AIzaSyBsO1gM5ySFNSn-rJnN0HyGEtuj3K5z22c",
            authDomain: "swearvault.firebaseapp.com",
            projectId: "swearvault",
            storageBucket: "swearvault.firebasestorage.app",
            messagingSenderId: "176233756449",
            appId: "1:176233756449:web:e7387814c263520a6c3060",
            measurementId: "G-507QBDN5QT"
        };

        // Firebase Başlat
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const users = [
            { id: 'arda', name: 'ARDA', color: '#00f2ff' },
            { id: 'recep', name: 'RECEP', color: '#bc4ed8' },
            { id: 'emir', name: 'EMİR', color: '#f8ef42' }
        ];

        const MAX_DEBT = 2000;

        // Veritabanını Dinle (Her değişiklikte anında çalışır)
        db.ref('vault').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            renderCards(data);
        });

        function renderCards(data) {
            const container = document.getElementById('cards-container');
            container.innerHTML = '';

            users.forEach(user => {
                const balance = data[user.id] || 0;
                const progressWidth = Math.min((balance / MAX_DEBT) * 100, 100);

                container.innerHTML += `
                    <div class="glass-card p-8 flex flex-col items-center relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1.5" style="background:${user.color}"></div>
                        <h2 class="text-lg font-bold text-gray-400 mb-4 tracking-[0.2em] uppercase">${user.name}</h2>
                        
                        <div class="text-5xl font-black mb-1 flex items-baseline">
                            ${balance} <span class="text-sm font-normal text-gray-500 ml-2 italic">TL</span>
                        </div>
                        
                        <div class="w-full bg-black/30 rounded-full h-2.5 my-8">
                            <div class="progress-glow h-full rounded-full" 
                                 style="width: ${progressWidth}%; background-color: ${user.color}; color: ${user.color}">
                            </div>
                        </div>

                        <div class="flex gap-4 w-full">
                            <button onclick="updateBalance('${user.id}', 50)" 
                                    class="btn-plus flex-1 py-4 rounded-xl font-black text-xs transition transform active:scale-90 uppercase">
                                +50 TL
                            </button>
                            <button onclick="updateBalance('${user.id}', -50)" 
                                    class="btn-minus flex-1 py-4 rounded-xl font-black text-xs transition transform active:scale-90 uppercase">
                                -50 TL
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function updateBalance(userId, amount) {
            const userRef = db.ref('vault/' + userId);
            userRef.transaction((currentValue) => {
                let newValue = (currentValue || 0) + amount;
                return newValue < 0 ? 0 : newValue;
            });
        }
    </script>
</body>
</html>
