<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HER KÜFÜR 50 TL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #050508 100%);
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .glitch-text {
            text-shadow: 3px 0 #ff00ff, -3px 0 #00ffff;
            letter-spacing: 2px;
            text-align: center;
            margin-top: 30px;
            margin-bottom: 40px;
            line-height: 1.2;
        }

        .btn-plus { background: linear-gradient(135deg, #22c55e, #15803d); box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }
        .btn-minus { background: linear-gradient(135deg, #ef4444, #b91c1c); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.2); }
        
        .progress-bar {
            height: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px currentColor;
        }
    </style>
</head>
<body>

    <h1 class="glitch-text text-3xl md:text-5xl font-black uppercase">
        HER KÜFÜR <span class="text-cyan-400">50 TL</span>
    </h1>

    <div id="cards-container" class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-6xl">
        <div class="col-span-full text-center py-20 text-gray-500 animate-pulse">Kasa Açılıyor...</div>
    </div>

    <script>
        // Senin Firebase Bilgilerin (Görsellerden aldığım güncel bilgiler)
        const firebaseConfig = {
            apiKey: "AIzaSyBsO1gM5ySFNSn-rJnN0HyGEtuj3K5z22c",
            authDomain: "swearvault.firebaseapp.com",
            databaseURL: "https://swearvault-default-rtdb.firebaseio.com",
            projectId: "swearvault",
            storageBucket: "swearvault.firebasestorage.app",
            messagingSenderId: "176233756449",
            appId: "1:176233756449:web:e7387814c263520a6c3060"
        };

        // Firebase Başlat
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const users = [
            { id: 'arda', name: 'ARDA', color: '#00f2ff' },
            { id: 'recep', name: 'RECEP', color: '#bc4ed8' },
            { id: 'emir', name: 'EMİR', color: '#f8ef42' }
        ];

        const MAX_DEBT = 2000;

        // Veritabanını Dinle
        db.ref('vault').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            const container = document.getElementById('cards-container');
            container.innerHTML = '';

            users.forEach(user => {
                const balance = data[user.id] || 0;
                const progressWidth = Math.min((balance / MAX_DEBT) * 100, 100);

                container.innerHTML += `
                    <div class="glass-card p-6 flex flex-col items-center relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1" style="background:${user.color}"></div>
                        <h2 class="text-lg font-bold text-gray-400 mb-2 uppercase tracking-widest">${user.name}</h2>
                        
                        <div class="text-5xl font-black mb-1">
                            ${balance}<span class="text-sm font-normal text-gray-500 ml-1">TL</span>
                        </div>
                        
                        <div class="w-full progress-bar">
                            <div class="progress-fill" style="width: ${progressWidth}%; background-color: ${user.color}; color: ${user.color}"></div>
                        </div>

                        <div class="flex gap-3 w-full">
                            <button onclick="updateBalance('${user.id}', 50)" class="btn-plus flex-1 py-4 rounded-xl font-black text-xs active:scale-95 transition">KÜFÜR (+50)</button>
                            <button onclick="updateBalance('${user.id}', -50)" class="btn-minus flex-1 py-4 rounded-xl font-black text-xs active:scale-95 transition opacity-70">SİL (-50)</button>
                        </div>
                    </div>
                `;
            });
        });

        // Borç Güncelleme
        function updateBalance(userId, amount) {
            const userRef = db.ref('vault/' + userId);
            userRef.transaction((current) => {
                let next = (current || 0) + amount;
                return next < 0 ? 0 : next;
            });
        }
    </script>
</body>
</html>
